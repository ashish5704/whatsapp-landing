<!DOCTYPE html>
<html>
<head>
  <title>Question</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      text-align: center;
      background: white;
      padding: 30px 20px 80px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 350px;
      height: 300px;
      overflow: hidden;
    }

    h2 {
      margin: 0;
      margin-bottom: 20px;
      font-size: 22px;
    }

    button {
      position: absolute;
      padding: 14px 22px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #yesBtn {
      background: #ff4d6d;
      color: white;
      left: 20px;
      top: 80px;
    }

    #noBtn {
      background: #4CAF50;
      color: white;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>

<div class="container" id="box">
  <h2 id="title">Are you still angry on me? 🥺</h2>
  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>
</div>

<script>
let scale = 1;
let index = 0;

let messages = [
  "Are you still angry on me? 🥺",
  "Really? 😟",
  "Still?? 😭",
  "Okay this is getting serious 😶",
  "You’re not giving up huh 😤"
];

// 🔊 audio (iPhone fix)
const audio = new Audio("https://www.soundjay.com/human/sounds/aww-01.mp3");
let audioUnlocked = false;

document.body.addEventListener("touchstart", unlockAudio, { once: true });
document.body.addEventListener("click", unlockAudio, { once: true });

function unlockAudio() {
  audio.play().then(() => {
    audio.pause();
    audio.currentTime = 0;
    audioUnlocked = true;
  }).catch(() => {});
}

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const box = document.getElementById("box");
const title = document.getElementById("title");

yesBtn.addEventListener("click", moveYes);
noBtn.addEventListener("click", goNo);

function moveYes() {
  // 🔊 sound (now works better on iPhone)
  if (audioUnlocked) {
    audio.currentTime = 0;
    audio.play();
  }

  // ❌ vibration skipped (not supported on iPhone)

  // shrink
  scale *= 0.85;
  yesBtn.style.transform = `scale(${scale})`;

  // SAFE movement inside container
  const boxRect = box.getBoundingClientRect();
  const btnRect = yesBtn.getBoundingClientRect();

  const padding = 10;

  const minX = padding;
  const maxX = box.clientWidth - btnRect.width - padding;

  const minY = 70; // below title
  const maxY = box.clientHeight - 80; // above NO button

  let x = Math.random() * (maxX - minX) + minX;
  let y = Math.random() * (maxY - minY) + minY;

  yesBtn.style.left = x + "px";
  yesBtn.style.top = y + "px";

  // change message
  index = (index + 1) % messages.length;
  title.innerText = messages[index];
}

function goNo() {
  box.innerHTML = "<h2>Okay 🙂</h2>";

  setTimeout(() => {
    window.open('', '_self');
    window.close();
  }, 2000);
}
</script>

</body>
</html>
