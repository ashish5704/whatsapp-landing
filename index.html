<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    a.open-link {
      padding: 14px 28px;
      background: #4f46e5;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1.1rem;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
      transition: background 0.2s;
      cursor: pointer;
    }

    a.open-link:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <!-- Using onclick + window.open so the child tab can be closed by Button A -->
  <a class="open-link" onclick="window.open('choice.html','choicePage','width=600,height=400'); return false;" href="#">
    Click here ✨
  </a>
</body>
</html>
