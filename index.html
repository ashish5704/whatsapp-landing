<!DOCTYPE html>
<html>
<head>
  <title>Question</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 350px;
      position: relative;
    }

    h2 {
      margin-bottom: 30px;
      color: #333;
      font-size: 22px;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px 0;
      transition: all 0.25s ease;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
      position: relative;
    }

    #noBtn {
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>

<div class="container" id="box">
  <h2 id="title">Are you still angry on me? 🥺</h2>
  <button id="yesBtn">Yes</button>
  <button id="noBtn" onclick="goNo()">No</button>
</div>

<script>
let scale = 1;

let messages = [
  "Are you still angry on me? 🥺",
  "Really? 😟",
  "Still?? 😭",
  "Okay this is getting serious 😶",
  "You’re not giving up huh 😤"
];

let index = 0;

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const title = document.getElementById("title");

yesBtn.addEventListener("click", moveYes);
yesBtn.addEventListener("touchstart", moveYes);
yesBtn.addEventListener("mouseover", moveYes);

function moveYes() {
  scale *= 0.8;
  yesBtn.style.transform = `scale(${scale})`;

  let tries = 0;
  let safe = false;

  while (!safe && tries < 20) {
    let x = Math.random() * 200 - 100;
    let y = Math.random() * 200 - 100;

    yesBtn.style.left = x + "px";
    yesBtn.style.top = y + "px";

    // get positions
    const yesRect = yesBtn.getBoundingClientRect();
    const noRect = noBtn.getBoundingClientRect();

    // check overlap
    safe = !(
      yesRect.right > noRect.left &&
      yesRect.left < noRect.right &&
      yesRect.bottom > noRect.top &&
      yesRect.top < noRect.bottom
    );

    tries++;
  }

  // change message
  index = (index + 1) % messages.length;
  title.innerText = messages[index];
}

function goNo() {
  const box = document.getElementById("box");
  box.innerHTML = "<h2>You are sweet 🙂</h2>";

  setTimeout(() => {
    window.open('', '_self');
    window.close();
  }, 2000);
}
</script>

</body>
</html>
