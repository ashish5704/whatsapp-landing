<!DOCTYPE html>
<html>
<head>
  <title>Question</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px 20px 80px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 360px;
      position: relative;
    }

    h2 {
      margin-bottom: 25px;
      font-size: 22px;
      color: #333;
    }

    .btn-area {
      position: relative;
      height: 160px; /* movement zone */
    }

    button {
      position: absolute;
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #yesBtn {
      background: #ff4d6d;
      color: white;
      left: 20px;
      top: 20px;
    }

    #noBtn {
      background: #4CAF50;
      color: white;
      right: 20px;
      bottom: 20px;
    }
  </style>
</head>
<body>

<div class="container" id="box">
  <h2 id="title">Are you still angry on me? 🥺</h2>

  <div class="btn-area" id="area">
    <button id="yesBtn">Yes</button>
    <button id="noBtn">No</button>
  </div>
</div>

<script>
let scale = 1;
let index = 0;

const messages = [
  "Are you still angry on me? 🥺",
  "Really? 😟",
  "Still?? 😭",
  "Okay this is getting serious 😶",
  "You’re not giving up huh 😤"
];

// 🔊 iPhone-safe audio
const audio = new Audio("https://www.soundjay.com/human/sounds/aww-01.mp3");
let unlocked = false;

document.body.addEventListener("click", () => {
  if (!unlocked) {
    audio.play().then(() => {
      audio.pause();
      audio.currentTime = 0;
      unlocked = true;
    }).catch(()=>{});
  }
}, { once: true });

const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const area = document.getElementById("area");
const title = document.getElementById("title");

yesBtn.addEventListener("click", moveYes);
noBtn.addEventListener("click", goNo);

function moveYes() {

  // 🔊 sound
  if (unlocked) {
    audio.currentTime = 0;
    audio.play();
  }

  // 📳 vibration (Android only)
  if (navigator.vibrate) {
    navigator.vibrate(80);
  }

  // shrink
  scale *= 0.85;
  yesBtn.style.transform = `scale(${scale})`;

  const areaRect = area.getBoundingClientRect();
  const btnRect = yesBtn.getBoundingClientRect();
  const noRect = noBtn.getBoundingClientRect();

  let tries = 0;
  let safe = false;

  while (!safe && tries < 30) {

    let x = Math.random() * (area.clientWidth - btnRect.width);
    let y = Math.random() * (area.clientHeight - btnRect.height);

    yesBtn.style.left = x + "px";
    yesBtn.style.top = y + "px";

    const newRect = yesBtn.getBoundingClientRect();

    // avoid NO button overlap
    safe = !(
      newRect.right > noRect.left &&
      newRect.left < noRect.right &&
      newRect.bottom > noRect.top &&
      newRect.top < noRect.bottom
    );

    tries++;
  }

  // change message
  index = (index + 1) % messages.length;
  title.innerText = messages[index];
}

function goNo() {
  const box = document.getElementById("box");
  box.innerHTML = "<h2>Thank you 🙂</h2>";

  setTimeout(() => {
    window.open('', '_self');
    window.close();
  }, 2000);
}
</script>

</body>
</html>
