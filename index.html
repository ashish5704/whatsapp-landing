<!DOCTYPE html>
<html>
<head>
  <title>Question</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      background: white;
      padding: 30px 20px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 350px;
    }

    h2 {
      margin-bottom: 30px;
      color: #333;
      font-size: 22px;
    }

    button {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 10px 0;
      transition: all 0.25s ease;
    }

    /* YES = red + tricky 😈 */
    #yesBtn {
      background-color: #ff4d6d;
      color: white;
      position: relative;
    }

    /* NO = green + normal ✅ */
    #noBtn {
      background-color: #4CAF50;
      color: white;
    }
  </style>
</head>
<body>

<div class="container" id="mainBox">
  <h2>Are you still angry on me? 🥺</h2>
  <button id="yesBtn" onclick="goYes()">Yes</button>
  <button id="noBtn" onclick="goNo()">No</button>
</div>

<script>
let scale = 1;

/* YES shrinks + moves */
function goYes() {
  const btn = document.getElementById("yesBtn");

  scale *= 0.75;
  btn.style.transform = `scale(${scale})`;

  btn.style.left = (Math.random() * 150 - 75) + "px";
  btn.style.top = (Math.random() * 150 - 75) + "px";
}

/* NO shows message → waits → tries to close */
function goNo() {
  const box = document.getElementById("mainBox");

  box.innerHTML = "<h2>Thank you 🙂</h2>";

  setTimeout(() => {
    window.open('', '_self');
    window.close();
  }, 2000);
}
</script>

</body>
</html>
