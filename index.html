<!DOCTYPE html>
<html>
<head>
  <title>Choose an Option</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 100px;
    }

    #btnB {
      padding: 15px 30px;
      font-size: 18px;
      transition: all 0.3s ease;
      position: relative;
    }

    button {
      margin: 10px;
      padding: 15px 30px;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Choose an option</h2>

<button onclick="goA()">Option A</button>
<button id="btnB" onclick="goB()">Option B</button>

<script>
function goA() {
  window.location.href = "https://wa.me/1234567890";
}

let scale = 1;

function goB() {
  scale *= 0.7;

  const btn = document.getElementById("btnB");
  btn.style.transform = `scale(${scale})`;

  // move randomly to make it harder 😈
  btn.style.left = Math.random() * 200 - 100 + "px";
  btn.style.top = Math.random() * 200 - 100 + "px";
}
</script>

</body>
</html>
