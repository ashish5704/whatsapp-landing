<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose an Option</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: #f0f4f8;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      margin-top: 40px;
      color: #1e293b;
      font-size: 1.4rem;
    }

    .btn {
      position: absolute;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.1s;
      user-select: none;
    }

    #btnA {
      background: #ef4444;
      color: #fff;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
      /* Initial position — horizontally centred */
      top: 45%;
      left: calc(50% - 130px);
    }

    #btnB {
      background: #22c55e;
      color: #fff;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
      top: 45%;
      left: calc(50% + 10px);
    }

    .btn:hover { transform: scale(1.06); }

    /* Fallback message shown when window.close() is blocked */
    #closeMsg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    #closeMsg div {
      background: #fff;
      padding: 30px 40px;
      border-radius: 12px;
      text-align: center;
      font-size: 1rem;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <h1>Pick an option</h1>

  <button id="btnA" class="btn" onclick="closeTab()">A — Close</button>
  <button id="btnB" class="btn" onclick="startMayhem()">B — Move &amp; Shrink</button>

  <!-- Fallback overlay if window.close() is blocked by the browser -->
  <div id="closeMsg">
    <div>
      <p>Your browser blocked automatic close.</p>
      <p>Please close this tab manually. 🙏</p>
      <button onclick="document.getElementById('closeMsg').style.display='none'"
              style="margin-top:12px;padding:8px 20px;border:none;border-radius:6px;background:#4f46e5;color:#fff;cursor:pointer;font-size:1rem;">
        OK
      </button>
    </div>
  </div>

  <script>
    /* ── Button A: close the tab ── */
    function closeTab() {
      window.close();
      // If still open after a short delay, show the fallback message
      setTimeout(() => {
        if (!window.closed) {
          document.getElementById('closeMsg').style.display = 'flex';
        }
      }, 300);
    }

    /* ── Button B: move & shrink both buttons ── */
    let shrinkStep = 0;
    const MIN_FONT  = 8;   // px — won't go smaller than this
    const MIN_PAD   = 2;   // px
    let interval = null;

    function randomPos(btnEl) {
      const w = window.innerWidth  - btnEl.offsetWidth  - 20;
      const h = window.innerHeight - btnEl.offsetHeight - 20;
      return {
        top:  Math.max(60, Math.floor(Math.random() * h)),
        left: Math.max(10, Math.floor(Math.random() * w))
      };
    }

    function shrinkBtn(btn, step) {
      const fontSize = Math.max(MIN_FONT, 1.1 * 16 - step * 2);          // rem → px, decrease 2px each step
      const padding  = Math.max(MIN_PAD,  14   - step * 2);
      const padH     = Math.max(MIN_PAD,  32   - step * 3);
      btn.style.fontSize = fontSize + 'px';
      btn.style.padding  = `${padding}px ${padH}px`;
    }

    function moveAndShrink() {
      const a = document.getElementById('btnA');
      const b = document.getElementById('btnB');

      shrinkStep++;

      [a, b].forEach(btn => {
        const pos = randomPos(btn);
        btn.style.top  = pos.top  + 'px';
        btn.style.left = pos.left + 'px';
        shrinkBtn(btn, shrinkStep);
      });
    }

    function startMayhem() {
      // Clear any previous interval
      if (interval) clearInterval(interval);
      // Move immediately on first click, then every 800 ms
      moveAndShrink();
      interval = setInterval(moveAndShrink, 800);
    }
  </script>
</body>
</html>
